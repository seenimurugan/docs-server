# docs-server.yaml — nginx + Docsify + git-puller sidecar
# Auto-discovers all seenimurugan/* repos with a docs/ folder and serves them.
# Deploy with: ./deploy.sh (envsubst-templated)
# ---------------------------------------------------------------------------
# Variables (set in .env):
#   HOMELAB_NAMESPACE        — Kubernetes namespace (default: homelab)
#   NGINX_IMAGE              — nginx image name (default: nginx)
#   NGINX_TAG                — nginx image tag (default: alpine)
#   GITHUB_USER              — GitHub user to scan for repos (default: seenimurugan)
#   SYNC_INTERVAL_SECONDS    — seconds between sync cycles (default: 300)
# ---------------------------------------------------------------------------
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: docs-puller-script
  namespace: ${HOMELAB_NAMESPACE}
data:
  sync.sh: |
    #!/usr/bin/env bash
    set -uo pipefail
    SYNC_INTERVAL_SECONDS="${SYNC_INTERVAL_SECONDS:-300}"
    GITHUB_USER="${GITHUB_USER:-seenimurugan}"
    GITHUB_TOKEN="${GITHUB_TOKEN:?GITHUB_TOKEN required}"
    AGG_DIR=/docs-aggregated

    curl_gh() {
      curl -sf -H "Authorization: token $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" "$@"
    }

    generate_sidebar() {
      echo "<!-- auto-generated by docs-server git-puller -->"
      echo "* [Home](/)"
      echo ""
      # Top-level (homelab-docs) — its files are symlinked at the root
      if [ -d "$AGG_DIR/homelab-docs/docs" ]; then
        echo "* **Homelab**"
        echo "  * [Overview](/README.md)"
        for f in "$AGG_DIR/homelab-docs/docs"/*.md; do
          [ -f "$f" ] || continue
          name=$(basename "$f" .md)
          [ "$name" = "README" ] && continue
          [ "$name" = "_sidebar" ] && continue
          label=$(echo "$name" | sed 's/-/ /g' | awk '{$1=toupper(substr($1,1,1)) substr($1,2); print}')
          echo "  * [$label](/$name.md)"
        done
        echo ""
      fi
      # Per-app sections (alpha-sorted, skip homelab-docs)
      for repo_dir in $(ls -d "$AGG_DIR"/*/ 2>/dev/null | sort); do
        repo=$(basename "$repo_dir")
        [ "$repo" = "homelab-docs" ] && continue
        [ -d "$repo_dir/docs" ] || continue
        [ -f "$repo_dir/docs/README.md" ] || continue
        title=$(echo "$repo" | sed 's/-/ /g' | awk '{for(i=1;i<=NF;i++)$i=toupper(substr($i,1,1)) substr($i,2)}1')
        echo "* **$title**"
        for f in "$repo_dir/docs"/*.md; do
          [ -f "$f" ] || continue
          name=$(basename "$f" .md)
          case "$name" in
            README) label="Overview" ;;
            USAGE) label="Usage" ;;
            USER-MANUAL) label="User manual" ;;
            MAINTENANCE) label="Maintenance" ;;
            ARCHITECTURE) label="Architecture" ;;
            *) label=$(echo "$name" | sed 's/-/ /g' | awk '{for(i=1;i<=NF;i++)$i=toupper(substr($i,1,1)) substr($i,2)}1') ;;
          esac
          echo "  * [$label](/$repo/docs/$name.md)"
        done
        echo ""
      done
    }

    # Copy index.html into the aggregated root on startup (nginx needs it there)
    cp /scripts/index.html "$AGG_DIR/index.html"
    echo "index.html written to $AGG_DIR"

    while true; do
      echo "[$(date -u)] sync cycle starting"

      # List repos (up to 100 per page; one page is enough for this account)
      # Use /user/repos (authenticated) so all private repos are included.
      # Parse full_name to extract repo names reliably (avoids other "name" fields).
      REPOS=$(curl_gh "https://api.github.com/user/repos?per_page=100&type=owner" \
        | grep -o "\"full_name\": \"$GITHUB_USER/[^\"]*\"" \
        | sed "s/\"full_name\": \"$GITHUB_USER\///;s/\"//g" 2>/dev/null)

      if [ -z "$REPOS" ]; then
        echo "  WARN: no repos returned (auth issue?)"
      fi

      for repo in $REPOS; do
        # Skip if no docs/ folder
        if ! curl_gh "https://api.github.com/repos/$GITHUB_USER/$repo/contents/docs" >/dev/null 2>&1; then
          continue
        fi

        TARGET="$AGG_DIR/$repo"
        URL="https://x-access-token:$GITHUB_TOKEN@github.com/$GITHUB_USER/$repo.git"

        if [ -d "$TARGET/.git" ]; then
          git -C "$TARGET" remote set-url origin "$URL" 2>/dev/null
          if git -C "$TARGET" fetch --quiet --depth=1 origin HEAD 2>/dev/null \
             && git -C "$TARGET" reset --hard FETCH_HEAD --quiet 2>/dev/null; then
            echo "  pulled $repo"
          else
            echo "  WARN: pull failed for $repo"
          fi
        else
          rm -rf "$TARGET"
          if git clone --quiet --depth=1 "$URL" "$TARGET" 2>/dev/null; then
            echo "  cloned $repo"
          else
            echo "  WARN: clone failed for $repo"
          fi
        fi
      done

      # Symlink homelab-docs root files into the aggregated root
      if [ -d "$AGG_DIR/homelab-docs/docs" ]; then
        for f in "$AGG_DIR/homelab-docs/docs"/*; do
          [ -f "$f" ] || continue
          bn=$(basename "$f")
          [ "$bn" = "_sidebar.md" ] && continue  # sidebar is auto-generated
          ln -sf "homelab-docs/docs/$bn" "$AGG_DIR/$bn"
        done
      fi

      # Regenerate sidebar
      generate_sidebar > "$AGG_DIR/_sidebar.md.tmp"
      mv "$AGG_DIR/_sidebar.md.tmp" "$AGG_DIR/_sidebar.md"

      echo "[$(date -u)] sync cycle complete; sleeping ${SYNC_INTERVAL_SECONDS}s"
      sleep "$SYNC_INTERVAL_SECONDS"
    done

  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0">
      <title>Homelab Docs</title>
      <meta name="description" content="Self-hosted homelab maintenance docs">
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/themes/vue.css">
      <style>
        :root {
          --theme-color: #4263eb;
          --base-font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        @media (max-width: 768px) {
          .sidebar { width: 250px; }
          .content { padding-top: 50px; }
        }
      </style>
    </head>
    <body>
      <div id="app">Loading homelab docs…</div>
      <script>
        window.$docsify = {
          name: 'Homelab',
          loadSidebar: '_sidebar.md',
          homepage: 'README.md',
          subMaxLevel: 0,
          maxLevel: 4,
          relativePath: true,
          search: {
            placeholder: 'Search docs…',
            depth: 6
          },
          themeColor: '#4263eb',
          auto2top: true,
          executeScript: false
        }
      </script>
      <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
      <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
      <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-bash.min.js"></script>
      <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-yaml.min.js"></script>
      <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-json.min.js"></script>
    </body>
    </html>

  nginx.conf: |
    server {
      listen 80;
      root /usr/share/nginx/html;
      index index.html;

      # Serve markdown files with correct content-type
      location ~ \.md$ {
        default_type text/markdown;
        charset utf-8;
        add_header Cache-Control "no-cache";
      }

      # Block AppleDouble and macOS metadata files
      location ~ /\._ { return 404; }
      location ~ /\.DS_Store { return 404; }

      location / { try_files $uri $uri/ /index.html; }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docs-server
  namespace: ${HOMELAB_NAMESPACE}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docs-server
  template:
    metadata:
      labels:
        app: docs-server
    spec:
      containers:
        - name: nginx-docs
          image: ${NGINX_IMAGE}:${NGINX_TAG}
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          volumeMounts:
            - name: docs-aggregated
              mountPath: /usr/share/nginx/html
              readOnly: true
            - name: puller-script
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
              readOnly: true

        - name: git-puller
          image: bitnami/git:latest
          command: ["/bin/bash", "/scripts/sync.sh"]
          envFrom:
            - secretRef:
                name: docs-puller-secret
          env:
            - name: GITHUB_USER
              value: "${GITHUB_USER}"
            - name: SYNC_INTERVAL_SECONDS
              value: "${SYNC_INTERVAL_SECONDS}"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          volumeMounts:
            - name: docs-aggregated
              mountPath: /docs-aggregated
            - name: puller-script
              mountPath: /scripts
              readOnly: true

      volumes:
        - name: docs-aggregated
          emptyDir: {}
        - name: puller-script
          configMap:
            name: docs-puller-script
            defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: docs-server
  namespace: ${HOMELAB_NAMESPACE}
spec:
  type: ClusterIP
  selector:
    app: docs-server
  ports:
    - port: 80
      targetPort: http
      name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: docs-server
  namespace: ${HOMELAB_NAMESPACE}
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: docs-server
      port:
        number: 80
  tls:
    - hosts:
        - docs
